AWSTemplateFormatVersion: '2010-09-09'
Description: Despliegue Finsy - Version Final Limpia

Resources:
  # Cambiamos el nombre del bucket para descartar colisiones globales
  FinsyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: finsy-mya-deploy-v2026

  FinsyInstance:
    Type: AWS::EC2::Instance
    Properties:
      # Escribe esto manualmente si puedes: ami-0e2c8ccd4e1223c32
      ImageId: ami-0e2c8ccd4e1223c32
      InstanceType: t2.micro
      IamInstanceProfile: LabInstanceProfile
      # Asegúrate que el nombre de tu llave sea exactamente MyA_Key
      KeyName: MyA_Key
      Tags:
        - Key: Name
          Value: Finsy-Server-Prod
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt-get update -y
          apt-get install -y git docker.io
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ubuntu
          cd /home/ubuntu
          git clone https://github.com/Racoth505/MyA_ProyectoDevOps.git